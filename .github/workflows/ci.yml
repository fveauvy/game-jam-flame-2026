name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web
        run: >-
          flutter build web --wasm --release --base-href /play/
          --dart-define=LEADERBOARD_SUBMIT_URL=${{ secrets.LEADERBOARD_SUBMIT_URL }}
          --dart-define=LEADERBOARD_KEY_PART_A=${{ secrets.LEADERBOARD_KEY_PART_A }}
          --dart-define=LEADERBOARD_KEY_PART_B=${{ secrets.LEADERBOARD_KEY_PART_B }}

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
