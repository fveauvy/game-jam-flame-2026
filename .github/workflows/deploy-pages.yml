name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build web
        run: flutter build web --release --base-href /game-jam-flame-2026/play/

      - name: Move game to /play/ subdirectory and copy landing page
        run: |
          # Create a temp directory to hold the game files
          mkdir -p /tmp/game_files
          mv build/web/* /tmp/game_files/
          
          # Create the play directory
          mkdir -p build/web/play
          
          # Move all game files to play/ subdirectory
          mv /tmp/game_files/* build/web/play/
          
          # Copy landing page files to root
          cp -r landing/* build/web/
          
          echo "Structure after setup:"
          ls -la build/web/
          ls -la build/web/play/ | head -20

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
