name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build web
        run: flutter build web --wasm --release --pwa-strategy=none --base-href /play/

      - name: Move game under /play and add landing pages
        run: |
          temp_dir="$(mktemp -d)"
          cp -a build/web/. "$temp_dir"/
          rm -rf build/web
          mkdir -p build/web/play
          cp -a "$temp_dir"/. build/web/play/
          cp -a landing/. build/web/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
